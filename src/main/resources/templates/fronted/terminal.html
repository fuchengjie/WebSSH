<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSSH</title>

    <link rel="shortcut icon" href="/static/assets/img/favicon.ico">
    <link rel="stylesheet" href="/static/plugins/layui/css/layui.css">
    <link rel="stylesheet" href="/static/plugins/xterm/xterm.css"/>

    <script src="/static/plugins/jquery/jquery-3.4.1.min.js" charset="utf-8"></script>
    <script src="/static/plugins/layui/layui.js" charset="utf-8"></script>
    <script src="/static/assets/js/jssh.js" charset="utf-8"></script>
    <script src="/static/plugins/xterm/xterm.js" charset="utf-8"></script>
    <script src="/static/plugins/xterm/xterm-addon-fit.js" charset="utf-8"></script>

    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --panel-hover: #1f242c;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
            --terminal-bg: #000000;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .app-shell {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部状态栏 */
        .topbar {
            height: 52px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            z-index: 20;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: var(--accent);
            color: #fff;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 800;
        }

        .host-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.25);
            border-radius: 20px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            color: var(--accent);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 32px;
            padding: 0 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .toolbar-btn:hover {
            background: var(--panel-hover);
            color: var(--text);
            border-color: var(--text-secondary);
        }

        .toolbar-btn.danger:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .status-dot.disconnected {
            background: var(--danger);
            box-shadow: 0 0 6px var(--danger);
        }

        /* 主工作区 */
        .workspace {
            flex: 1;
            min-height: 0;
            display: flex;
            position: relative;
        }

        /* 文件抽屉 */
        .file-drawer {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border-right: 1px solid var(--border);
            transition: margin-left 0.25s ease;
        }

        .file-drawer.collapsed {
            margin-left: -320px;
        }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .drawer-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .drawer-close {
            display: none;
            width: 26px;
            height: 26px;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 0;
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .drawer-close:hover {
            background: var(--panel-hover);
            color: var(--text);
        }

        /* 路径栏 */
        .path-bar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .path-input-wrap {
            display: flex;
            gap: 8px;
        }

        .path-input-wrap input {
            flex: 1;
            min-width: 0;
            height: 34px;
            padding: 0 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: "SFMono-Regular", Consolas, Menlo, monospace;
            font-size: 13px;
        }

        .path-input-wrap input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .icon-btn:hover {
            background: var(--panel-hover);
            color: var(--text);
            border-color: var(--text-secondary);
        }

        /* 上传区 */
        .upload-zone {
            margin: 12px 16px;
            padding: 14px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            background: var(--bg);
            text-align: center;
            transition: all 0.2s ease;
        }

        .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.08);
        }

        .upload-zone-text {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .upload-zone-text i {
            display: block;
            font-size: 22px;
            margin-bottom: 6px;
            color: var(--accent);
        }

        .upload-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .upload-actions input[type="file"] {
            display: none;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 30px;
            padding: 0 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-default {
            background: var(--bg);
            border-color: var(--border);
            color: var(--text);
        }

        .btn-default:hover {
            background: var(--panel-hover);
            border-color: var(--text-secondary);
        }

        .file-hint {
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        /* 文件列表 */
        .file-list-wrap {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .file-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .file-table thead th {
            position: sticky;
            top: 0;
            padding: 8px 12px;
            background: var(--panel);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            z-index: 1;
        }

        .file-table tbody td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            vertical-align: middle;
        }

        .file-table tbody tr:hover {
            background: var(--panel-hover);
        }

        .file-name-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 140px;
        }

        .file-name-cell i {
            font-size: 15px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .file-name-cell i.dir-icon {
            color: var(--warning);
        }

        .file-name-cell a, .file-name-cell span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-name-cell a {
            color: var(--text);
            cursor: pointer;
        }

        .file-name-cell a:hover {
            color: var(--accent);
        }

        .file-table .muted {
            color: var(--text-secondary);
        }

        .file-actions-cell {
            white-space: nowrap;
        }

        .file-action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            margin-right: 2px;
            background: transparent;
            border: 0;
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .file-action-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }

        .file-action-btn.danger:hover {
            color: var(--danger);
        }

        .empty-row {
            padding: 32px 16px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* 抽屉底部状态栏 */
        .drawer-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 终端区域 */
        .terminal-panel {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: var(--terminal-bg);
            position: relative;
        }

        .terminal-wrap {
            flex: 1;
            min-height: 0;
            padding: 0;
        }

        #container {
            width: 100%;
            height: 100%;
        }

        /* 展开抽屉的悬浮按钮（抽屉折叠后显示） */
        .drawer-toggle {
            position: absolute;
            left: 12px;
            top: 12px;
            z-index: 10;
            width: 34px;
            height: 34px;
            display: none;
            align-items: center;
            justify-content: center;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .drawer-toggle:hover {
            color: var(--text);
            border-color: var(--text-secondary);
        }

        /* 抽屉折叠时显示展开按钮 */
        .file-drawer.collapsed ~ .terminal-panel .drawer-toggle {
            display: inline-flex;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .file-drawer {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 30;
                box-shadow: 2px 0 12px rgba(0, 0, 0, 0.5);
            }

            .file-drawer.collapsed {
                margin-left: -320px;
                box-shadow: none;
            }

            .drawer-close {
                display: inline-flex;
            }

            .drawer-toggle {
                display: inline-flex;
            }

            .host-badge span {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <!-- 顶部状态栏 -->
    <header class="topbar">
        <div class="topbar-left">
            <div class="brand">
                <span class="brand-mark">$_</span>
                <span>WebSSH</span>
            </div>
            <div class="host-badge" title="当前连接">
                <span class="status-dot" id="connStatus"></span>
                <span>[[${data.username}]]@[[${data.host}]]:[[${data.port}]]</span>
            </div>
        </div>
        <div class="topbar-right">
            <button type="button" class="toolbar-btn" id="btnToggleDrawer" title="切换文件面板">
                <i class="layui-icon layui-icon-template-1"></i> 文件
            </button>
            <button type="button" class="toolbar-btn danger" id="btnDisconnect" title="断开连接">
                <i class="layui-icon layui-icon-close"></i> 断开
            </button>
        </div>
    </header>

    <div class="workspace">
        <!-- 左侧文件抽屉 -->
        <aside class="file-drawer" id="fileDrawer">
            <div class="drawer-header">
                <div class="drawer-title">
                    <i class="layui-icon layui-icon-template-1"></i>
                    远程文件
                </div>
                <button type="button" class="drawer-close" id="btnCloseDrawer" title="关闭">
                    <i class="layui-icon layui-icon-close"></i>
                </button>
            </div>

            <div class="path-bar">
                <div class="path-input-wrap">
                    <input type="text" id="remotePath" value="/tmp/" autocomplete="off" placeholder="输入远程目录">
                    <button type="button" class="icon-btn" id="btnParent" title="上级目录">
                        <i class="layui-icon layui-icon-up"></i>
                    </button>
                    <button type="button" class="icon-btn" id="btnRefresh" title="刷新">
                        <i class="layui-icon layui-icon-refresh"></i>
                    </button>
                </div>
            </div>

            <div class="upload-zone" id="uploadZone">
                <div class="upload-zone-text">
                    <i class="layui-icon layui-icon-upload"></i>
                    拖拽文件到此处上传<br>或点击选择本地文件
                </div>
                <div class="upload-actions">
                    <input type="file" id="multipartFile">
                    <button type="button" class="btn btn-primary" id="btnSelectFile">
                        <i class="layui-icon layui-icon-file"></i> 选择文件
                    </button>
                    <button type="button" class="btn btn-default" id="btnMkdir">
                        <i class="layui-icon layui-icon-add-1"></i> 新目录
                    </button>
                </div>
                <div class="file-hint" id="fileHint">未选择文件</div>
            </div>

            <div class="file-list-wrap">
                <table class="file-table">
                    <thead>
                    <tr>
                        <th>名称</th>
                        <th style="width: 70px;">大小</th>
                        <th style="width: 90px;">修改时间</th>
                        <th style="width: 60px;">操作</th>
                    </tr>
                    </thead>
                    <tbody id="fileList">
                    <tr><td colspan="4"><div class="empty-row">正在读取目录...</div></td></tr>
                    </tbody>
                </table>
            </div>

            <div class="drawer-footer" id="fileStatus">目录：/tmp/</div>
        </aside>

        <!-- 右侧终端 -->
        <main class="terminal-panel">
            <button type="button" class="drawer-toggle" id="btnOpenDrawer" title="打开文件面板">
                <i class="layui-icon layui-icon-template-1"></i>
            </button>
            <div class="terminal-wrap">
                <div id="container"></div>
            </div>
        </main>
    </div>
</div>

<script th:inline="javascript" type="text/javascript">
    const host = [[${data.host}]];
    const port = [[${data.port}]];
    const username = [[${data.username}]];
    const password = [[${data.password}]];

    openTerminal("connect", host, port, username, password, "container");

    let layerRef = null;
    let isConnected = true;

    // 统一目录格式，保证前端展示和后端接口都使用以 / 结尾的目录路径。
    function normalizePath(path) {
        path = (path || '/tmp/').trim();
        if (!path) path = '/tmp/';
        return path.endsWith('/') ? path : path + '/';
    }

    function joinPath(base, name) {
        return normalizePath(base) + name + '/';
    }

    function parentPath(path) {
        path = normalizePath(path);
        if (path === '/') return '/';
        const trimmed = path.substring(0, path.length - 1);
        const index = trimmed.lastIndexOf('/');
        if (index <= 0) return '/';
        return trimmed.substring(0, index + 1);
    }

    // 所有文件接口都复用当前 SSH 连接参数和当前远程目录。
    function commonParams() {
        return {
            host: host,
            port: port,
            username: username,
            password: password,
            remotePath: normalizePath($('#remotePath').val())
        };
    }

    function setStatus(text, isError) {
        $('#fileStatus').text(text).css('color', isError ? 'var(--danger)' : 'var(--text-secondary)');
    }

    function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, function (char) {
            return ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[char]);
        });
    }

    function jsString(value) {
        return String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function formatSize(bytes) {
        bytes = Number(bytes || 0);
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        return (bytes / 1024 / 1024 / 1024).toFixed(1) + ' GB';
    }

    function formatTime(ts) {
        if (!ts) return '-';
        const d = new Date(ts);
        const pad = function (n) { return n < 10 ? '0' + n : '' + n; };
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function updateConnectionStatus(connected) {
        isConnected = connected;
        const dot = $('#connStatus');
        if (connected) {
            dot.removeClass('disconnected');
        } else {
            dot.addClass('disconnected');
        }
    }

    // 渲染远程目录列表：目录可点击进入，文件可下载或删除。
    function renderFiles(data) {
        const tbody = $('#fileList');
        tbody.empty();
        if (!Array.isArray(data) || data.length === 0) {
            tbody.append('<tr><td colspan="4"><div class="empty-row">当前目录为空</div></td></tr>');
            return;
        }
        data.forEach(function (item) {
            const name = escapeHtml(item.filename);
            const rawName = jsString(item.filename);
            const iconClass = item.directory ? 'layui-icon-template-1 dir-icon' : 'layui-icon-file';
            const nameCell = item.directory
                ? '<a onclick="enterDirectory(\'' + rawName + '\')" title="' + name + '">' + name + '</a>'
                : '<span title="' + name + '">' + name + '</span>';
            const downloadBtn = item.directory ? '' :
                '<button type="button" class="file-action-btn" onclick="downloadFile(\'' + rawName + '\')" title="下载"><i class="layui-icon layui-icon-download-circle"></i></button>';
            const row = '<tr>' +
                '<td><div class="file-name-cell"><i class="layui-icon ' + iconClass + '"></i>' + nameCell + '</div></td>' +
                '<td class="muted">' + (item.directory ? '-' : formatSize(item.size)) + '</td>' +
                '<td class="muted">' + formatTime(item.modifyTime) + '</td>' +
                '<td class="file-actions-cell">' + downloadBtn +
                '<button type="button" class="file-action-btn danger" onclick="deleteFile(\'' + rawName + '\')" title="删除"><i class="layui-icon layui-icon-delete"></i></button>' +
                '</td>' +
                '</tr>';
            tbody.append(row);
        });
    }

    // 刷新当前远程目录，让用户上传后马上看到文件落在哪里。
    function refreshList() {
        const path = normalizePath($('#remotePath').val());
        $('#remotePath').val(path);
        setStatus('正在读取：' + path, false);
        $.post('/file/list', commonParams(), function (data) {
            renderFiles(data);
            setStatus('目录：' + path + '，共 ' + data.length + ' 项', false);
        }).fail(function (xhr) {
            $('#fileList').html('<tr><td colspan="4"><div class="empty-row">读取失败</div></td></tr>');
            setStatus('读取失败：' + (xhr.responseText || xhr.statusText), true);
        });
    }

    function enterDirectory(filename) {
        $('#remotePath').val(joinPath($('#remotePath').val(), filename));
        refreshList();
    }

    // 删除当前目录下的文件或空目录，成功后重新读取目录状态。
    function deleteFile(filename) {
        layerRef.confirm('确定删除 "' + filename + '" 吗？', {icon: 3, title: '删除确认'}, function (index) {
            layerRef.close(index);
            setStatus('正在删除：' + filename, false);
            $.post('/file/delete', Object.assign({}, commonParams(), {filename: filename}), function (res) {
                setStatus(res.msg || '删除成功：' + filename, false);
                refreshList();
            }).fail(function (xhr) {
                setStatus('删除失败：' + (xhr.responseText || xhr.statusText), true);
            });
        });
    }

    // 用隐藏表单 POST 下载，避免把 SSH 凭据拼进 URL（会进浏览器历史和访问日志）。
    function downloadFile(filename) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/file/download';
        form.style.display = 'none';
        const params = Object.assign({}, commonParams(), {filename: filename});
        Object.keys(params).forEach(function (key) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = params[key];
            form.appendChild(input);
        });
        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
    }

    function doUpload(file) {
        if (!file) return;
        const path = normalizePath($('#remotePath').val());
        const formData = new FormData();
        formData.append('multipartFile', file);
        formData.append('host', host);
        formData.append('port', port);
        formData.append('username', username);
        formData.append('password', password);
        formData.append('remotePath', path);

        $('#fileHint').text('正在上传：' + file.name);
        setStatus('正在上传到 ' + path + '：' + file.name, false);
        $.ajax({
            url: '/upload',
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            success: function (res) {
                $('#multipartFile').val('');
                $('#fileHint').text('上传成功：' + file.name);
                setStatus((res.msg || '上传成功') + '：' + path + file.name, false);
                refreshList();
            },
            error: function (xhr) {
                $('#fileHint').text('上传失败：' + file.name);
                setStatus('上传失败：' + (xhr.responseText || xhr.statusText), true);
            }
        });
    }

    // 上传文件到当前远程目录，并在状态栏显示最终远程路径。
    function uploadFile() {
        const fileInput = document.getElementById('multipartFile');
        if (!fileInput.files || fileInput.files.length === 0) {
            setStatus('请先选择一个本地文件', true);
            return;
        }
        doUpload(fileInput.files[0]);
    }

    // 创建子目录后刷新列表，便于继续进入目录上传文件。
    function createDirectory() {
        layerRef.prompt({title: '新建远程目录', formType: 0}, function (value, index) {
            const dirname = (value || '').trim();
            if (!dirname) return;
            layerRef.close(index);
            $.post('/file/mkdir', Object.assign({}, commonParams(), {dirname: dirname}), function (res) {
                setStatus(res.msg || '目录创建成功：' + dirname, false);
                refreshList();
            }).fail(function (xhr) {
                setStatus('创建目录失败：' + (xhr.responseText || xhr.statusText), true);
            });
        });
    }

    function toggleDrawer() {
        $('#fileDrawer').toggleClass('collapsed');
    }

    function openDrawer() {
        $('#fileDrawer').removeClass('collapsed');
    }

    function closeDrawer() {
        $('#fileDrawer').addClass('collapsed');
    }

    layui.use(['layer'], function () {
        layerRef = layui.layer;

        // 路径与文件操作
        $('#btnRefresh').on('click', refreshList);
        $('#btnParent').on('click', function () {
            $('#remotePath').val(parentPath($('#remotePath').val()));
            refreshList();
        });
        $('#btnSelectFile').on('click', function () {
            $('#multipartFile').trigger('click');
        });
        $('#multipartFile').on('change', function () {
            const files = this.files;
            if (files && files.length > 0) {
                $('#fileHint').text('已选择：' + files[0].name);
                uploadFile();
            }
        });
        $('#btnMkdir').on('click', createDirectory);
        $('#remotePath').on('keydown', function (event) {
            if (event.keyCode === 13) refreshList();
        });

        // 抽屉开关
        $('#btnToggleDrawer').on('click', toggleDrawer);
        $('#btnCloseDrawer').on('click', closeDrawer);
        $('#btnOpenDrawer').on('click', openDrawer);

        // 拖拽上传
        const uploadZone = $('#uploadZone');
        uploadZone.on('dragover', function (e) {
            e.preventDefault();
            uploadZone.addClass('drag-over');
        });
        uploadZone.on('dragleave', function (e) {
            e.preventDefault();
            uploadZone.removeClass('drag-over');
        });
        uploadZone.on('drop', function (e) {
            e.preventDefault();
            uploadZone.removeClass('drag-over');
            const files = e.originalEvent.dataTransfer.files;
            if (files && files.length > 0) {
                $('#fileHint').text('已选择：' + files[0].name);
                doUpload(files[0]);
            }
        });

        // 断开连接：关闭页面即可，也可以扩展为调用后端关闭 WebSocket
        $('#btnDisconnect').on('click', function () {
            layerRef.confirm('确定断开当前 SSH 连接吗？', {icon: 3, title: '断开连接'}, function (index) {
                layerRef.close(index);
                updateConnectionStatus(false);
                window.close();
            });
        });

        refreshList();
    });
</script>
</body>
</html>
