<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta http-equiv="content-type" content="text/html;charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>WebSSH</title>

    <link rel="shortcut icon" href="/static/assets/img/favicon.ico">
    <link rel="stylesheet" href="/static/plugins/layui/css/layui.css">
    <link rel="stylesheet" type="text/css" href="/static/assets/css/index_style.css">

    <script src="/static/plugins/jquery/jquery-3.4.1.min.js" charset="utf-8"></script>
    <script src="/static/plugins/layui/layui.js" charset="utf-8"></script>
</head>
<body>
<main class="login-shell">
    <section class="intro-panel" aria-label="WebSSH">
        <div class="brand-row">
            <span class="brand-mark">$_</span>
            <span class="brand-name">WebSSH</span>
        </div>
        <div class="intro-copy">
            <h1>浏览器里的远程终端</h1>
            <p>连接 SSH 主机后即可进入终端，同时管理远程目录中的文件。</p>
        </div>
        <div class="console-preview" aria-hidden="true">
            <div class="console-bar">
                <span></span><span></span><span></span>
            </div>
            <pre>ssh ubuntu@server
status  ready
sftp    /tmp/
resize  auto</pre>
        </div>
    </section>

    <section class="form-panel" aria-label="连接 SSH 主机">
        <form class="layui-form login-form" id="entry_form" lay-filter="frm" action="connect" method="post">
            <div class="form-heading">
                <h2>连接主机</h2>
                <p>输入 SSH 信息，连接前会先做一次可达性测试。</p>
            </div>

            <label class="field-label" for="host">主机地址</label>
            <div class="input-wrap">
                <i class="layui-icon layui-icon-website"></i>
                <input class="layui-input" type="text" name="host" id="host" required="required"
                       placeholder="例如 203.0.113.10" value="">
            </div>

            <label class="field-label" for="port">端口</label>
            <div class="input-wrap">
                <i class="layui-icon layui-icon-set"></i>
                <input class="layui-input" required="required" max="65535" min="1" type="number" name="port" id="port"
                       value="22">
            </div>

            <label class="field-label" for="username">用户名</label>
            <div class="input-wrap">
                <i class="layui-icon layui-icon-username"></i>
                <input class="layui-input" required="required" type="text" name="username" id="username"
                       placeholder="root / ubuntu">
            </div>

<label class="field-label" for="password">密码（密码登录时必填；私钥登录时可作为私钥口令）</label>
            <div class="input-wrap">
                <i class="layui-icon layui-icon-password"></i>
                <input class="layui-input" type="password" name="password" id="password"
                       placeholder="SSH 登录密码 / 私钥口令">
            </div>

            <label class="field-label" for="privateKey">私钥内容（可选）</label>
            <div class="input-wrap">
                <textarea class="layui-textarea" name="privateKey" id="privateKey" rows="4"
                          placeholder="如需私钥登录，请粘贴 PEM 格式私钥内容。OpenSSH 新格式（-----BEGIN OPENSSH PRIVATE KEY-----）需先用 ssh-keygen -p -m pem 转换。"></textarea>
            </div>

            <input type="hidden" id="command" name="command" value="">
            <input type="hidden" id="operate" name="operate" value="connect">

            <button class="connect-btn" lay-submit lay-filter="frm" type="submit" id="btn">
                <span class="btn-text">连接</span>
            </button>
            <div id="prompt" class="prompt" role="status"></div>
        </form>
    </section>
</main>

<script>
    layui.use(['form'], function () {
        var form = layui.form;
        var isSubmitting = false;

        $('#host').focus();

        // 登录页先调用 /testConnect，测试通过后再提交原表单进入终端页。
        form.on('submit(frm)', function (data) {
            if (isSubmitting) {
                return true;
            }

            var frmData = form.val("frm");
            var $button = $('#btn');
            var $prompt = $('#prompt');

            $prompt.removeClass('error success').text('正在测试 SSH 连接...');
            $button.prop('disabled', true).addClass('loading');
            $button.find('.btn-text').text('测试中');

            $.ajax({
                type: "POST",
                url: "testConnect",
                data: frmData,
                success: function (data) {
                    if (data.res == "true") {
                        $prompt.addClass('success').text('连接测试通过，正在进入终端...');
                        isSubmitting = true;
                        $('#entry_form')[0].submit();
                    } else {
                        $prompt.addClass('error').text("无法连接到主机：" + frmData["host"] + "，错误：" + (data.msg || '未知错误'));
                        resetButton();
                    }
                },
                error: function (xhr) {
                    $prompt.addClass('error').text("连接测试接口异常，HTTP 状态码：" + xhr.status);
                    resetButton();
                }
            });

            return false;
        });

        function resetButton() {
            $('#btn').prop('disabled', false).removeClass('loading').find('.btn-text').text('连接');
        }
    });
</script>
</body>
</html>
