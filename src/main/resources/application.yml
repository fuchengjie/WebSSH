server:
  port: 80
spring: 
  mvc: 
    # 静态文件配置位置，如果不配置将无法访问到js,css等，但是可以通过th:src="@{}"访问
    static-path-pattern: /static/**
    thymeleaf:
      # 关闭缓存，部署应该开启
      cache: false
      # 非严格模式的HTML语法检查
      mode: LEGACYHTML5
      prefix: classpath:/templates/
      suffix: .html
      encoding: UTF-8
webssh:
  # WebSocket 允许的来源，留空则允许任意源（仅适合内网调试）
  # 公网部署请填写明确来源，例如：
  # allowed-origins:
  #   - http://localhost
  #   - http://127.0.0.1
  allowed-origins:
